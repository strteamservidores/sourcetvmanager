name: build (Linux SM 1.11)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build SourceMod 1.11 (Linux)

    steps:
      - name: Prepare env
        run: |
          echo "GITHUB_SHA_SHORT=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib g++-multilib \
            libstdc++6:i386 lib32z1-dev \
            make git python3 python3-pip

      - name: Checkout SourceMod
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/sourcemod
          ref: 1.11-dev
          path: sourcemod
          submodules: recursive

      - name: Checkout Metamod
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/metamod-source
          ref: 1.11-dev
          path: metamod

      - name: Install AMBuild
        run: |
          python3 -m pip install --upgrade pip
          pip install git+https://github.com/alliedmodders/ambuild

      - name: Get SDKs
        run: |
          mkdir sdks
          cd sdks
          git clone --mirror https://github.com/alliedmodders/hl2sdk hl2sdk-proxy
          for sdk in csgo tf2 css hl2dm dods l4d2 l4d; do
            git clone hl2sdk-proxy -b $sdk hl2sdk-$sdk
          done

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src
          submodules: recursive

      - name: Build extension
        run: |
          mkdir build
          cd build
          # O segredo do AMBuild é apontar corretamente para os diretórios pai
          python3 ../plugin-src/configure.py \
            --enable-optimize \
            --sdks=present \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/metamod" \
            --hl2sdk-root="${{ github.workspace }}/sdks"
          ambuild

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: sourcetvmanager-linux-${{ env.GITHUB_SHA_SHORT }}
          path: build/package
