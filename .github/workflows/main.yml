```yaml
name: build (Linux SM 1.11)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    name: Build SourceMod 1.11 (Linux)

    env:
      SM_VERSION: "1.11"
      SM_BRANCH: "1.11-dev"
      META_BRANCH: "1.11-dev"

    steps:
      - name: Prepare env
        run: |
          echo "GITHUB_SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🔥 DEPENDÊNCIAS CORRETAS
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ \
            gcc-multilib g++-multilib \
            libc6-dev libc6-dev-i386 \
            libstdc++6 lib32stdc++6 \
            lib32z1-dev zlib1g-dev \
            make git python3 python3-pip

          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
          echo "CFLAGS=-m32 -fPIC" >> $GITHUB_ENV
          echo "CXXFLAGS=-m32 -fPIC -static-libstdc++ -static-libgcc -Wno-error=maybe-uninitialized -Wno-error=uninitialized" >> $GITHUB_ENV
          echo "LDFLAGS=-m32" >> $GITHUB_ENV

      - name: Checkout SourceMod
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ env.SM_BRANCH }}
          path: sourcemod
          submodules: recursive

      - name: Checkout Metamod
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/metamod-source
          ref: ${{ env.META_BRANCH }}
          path: metamod

      - name: Install AMBuild
        run: |
          python3 -m pip install wheel
          pip install git+https://github.com/alliedmodders/ambuild

      - name: Get SDKs
        run: |
          git clone --mirror https://github.com/alliedmodders/hl2sdk hl2sdk-proxy
          for sdk in csgo tf2 css hl2dm dods l4d2 l4d
          do
            git clone hl2sdk-proxy -b $sdk hl2sdk-$sdk
          done

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: sourcetvmanager
          submodules: recursive

      - name: Build extension
        working-directory: sourcetvmanager
        run: |
          mkdir build && cd build
          python3 ../configure.py \
            --enable-optimize \
            --sdks=present \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/metamod"
          ambuild

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: sourcetvmanager-linux-sm111
          path: sourcetvmanager/build/package
```
