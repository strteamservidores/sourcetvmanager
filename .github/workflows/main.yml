name: build (Linux)

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - LICENSE
      - README.md
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - LICENSE
      - README.md
  workflow_dispatch:

jobs:
  build:
    name: build with sm${{ matrix.sm_version }} (linux)
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        sm_version:
          - "1.9"
          - "1.10"
          - "1.11"
          - "1.12"
          - "latest"

        include:
          - meta_version: "1.10"
            meta_branch: "1.10-dev"

          - sm_version: latest
            sm_branch: master
            meta_version: latest
            meta_branch: master

          - sm_version: "1.9"
            sm_branch: "1.9-dev"

          - sm_version: "1.10"
            sm_branch: "1.10-dev"

          - sm_version: "1.11"
            sm_branch: "1.11-dev"
            meta_version: "1.11"
            meta_branch: "1.11-dev"

          - sm_version: "1.12"
            sm_branch: "1.12-dev"
            meta_version: "1.11"
            meta_branch: "1.11-dev"

    steps:
      - name: Prepare env
        run: |
          echo "GITHUB_SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🔥 DEPENDÊNCIAS LINUX (FIXED)
      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ \
            gcc-multilib g++-multilib \
            libc6-dev libc6-dev-i386 \
            libstdc++6 lib32stdc++6 \
            lib32z1-dev zlib1g-dev \
            make git python3 python3-pip

          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
          echo "CFLAGS=-m32 -fPIC" >> $GITHUB_ENV
          echo "CXXFLAGS=-m32 -fPIC -static-libstdc++ -static-libgcc" >> $GITHUB_ENV
          echo "LDFLAGS=-m32" >> $GITHUB_ENV

      - name: Getting SourceMod
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ matrix.sm_branch }}
          path: sourcemod-${{ matrix.sm_version }}
          submodules: recursive

      - name: Getting MM:Source
        uses: actions/checkout@v4
        with:
          repository: alliedmodders/metamod-source
          ref: ${{ matrix.meta_branch }}
          path: metamod-${{ matrix.meta_version }}

      - name: Install AMBuild
        run: |
          python3 -m pip install wheel
          pip install git+https://github.com/alliedmodders/ambuild

      - name: Getting SDKs
        run: |
          git clone --mirror https://github.com/alliedmodders/hl2sdk hl2sdk-proxy-repo
          sdks=(csgo tf2 css hl2dm dods l4d2 l4d)
          for sdk in "${sdks[@]}"
          do
            git clone hl2sdk-proxy-repo -b $sdk hl2sdk-$sdk
          done

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: sourcetvmanager
          submodules: recursive

      - name: Build extension
        working-directory: sourcetvmanager
        run: |
          mkdir build
          cd build
          python3 ../configure.py \
            --enable-optimize \
            --sdks=present \
            --sm-path="${{ github.workspace }}/sourcemod-${{ matrix.sm_version }}" \
            --mms-path="${{ github.workspace }}/metamod-${{ matrix.meta_version }}"
          ambuild

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: sourcetvmanager-sm${{ matrix.sm_version }}-linux
          path: sourcetvmanager/build/package
